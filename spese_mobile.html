<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Spese Casa">
<meta name="theme-color" content="#d6edba">
<link rel="manifest" href="manifest.json">
<title>Spese Casa</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg:#f2f0eb; --surface:#ffffff; --surface2:#e8e6e0; --border:rgba(0,0,0,0.08);
    --text:#1c1b18; --text2:#5a5955; --text3:#9a9890;
    --header-bg:#d6edba; --header-text:#1c3a14; --header-sub:#4a7a3a;
    --accent:#3a7a28; --today-bg:#e8f0fb; --today-accent:#2a6dd4;
    --red:#c62828; --green:#2e7d32; --orange:#854f0b;
  }

  .dark {
    --bg:#121210; --surface:#1c1c1a; --surface2:#2a2a28; --border:rgba(255,255,255,0.08);
    --text:#f2f0eb; --text2:#a09f98; --text3:#6a6860;
    --header-bg:#1c2615; --header-text:#d6edba; --header-sub:#97c459;
    --accent:#97c459; --today-bg:#0d2137; --today-accent:#4a9eff;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { 
    margin:0; font-family:'DM Sans', sans-serif; background:var(--bg); color:var(--text); 
    transition: background 0.3s; padding-bottom: 140px; 
  }

  /* Login Overlay */
  #login-screen {
    position:fixed; top:0; left:0; width:100%; height:100%; 
    background:var(--bg); z-index:10000; display:flex; 
    flex-direction:column; align-items:center; justify-content:center; padding:30px;
  }
  .login-card {
    background:var(--surface); padding:25px; border-radius:20px; 
    box-shadow:0 10px 30px rgba(0,0,0,0.1); width:100%; max-width:350px; text-align:center;
  }
  .login-card input {
    width:100%; padding:14px; margin:8px 0; border-radius:12px; 
    border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:16px;
  }

  /* Header & UI */
  header { background:var(--header-bg); padding:50px 20px 20px; text-align:center; position:sticky; top:0; z-index:100; border-bottom:1px solid var(--border); }
  .month-nav { display:flex; align-items:center; justify-content:center; gap:20px; margin-bottom:10px; }
  .month-nav h1 { font-size:24px; font-weight:600; margin:0; letter-spacing:-0.5px; }
  .btn-nav { background:none; border:none; font-size:24px; color:var(--accent); cursor:pointer; }
  
  .top-bar { position:absolute; top:15px; left:15px; right:15px; display:flex; justify-content:space-between; }
  .btn-icon { background:var(--surface); border:none; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; box-shadow:0 2px 8px rgba(0,0,0,0.1); font-size:18px; }

  /* Cards */
  .container { padding:15px; display:flex; flex-direction:column; gap:12px; }
  .day-card { background:var(--surface); border-radius:18px; border:1px solid var(--border); overflow:hidden; transition: transform 0.2s; }
  .day-card.today { border:2px solid var(--today-accent); background:var(--today-bg); }
  
  .card-header { padding:14px 18px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
  .day-info { display:flex; align-items:baseline; gap:8px; }
  .day-num { font-size:20px; font-weight:700; color:var(--text); }
  .day-name { font-size:14px; color:var(--text3); text-transform:uppercase; font-weight:500; }
  
  .card-summary { font-family:'DM Mono', monospace; font-weight:500; font-size:14px; }
  .card-summary.pos { color:var(--green); }
  .card-summary.neg { color:var(--red); }

  .card-content { display:none; padding:0 18px 18px; }
  .card-content.open { display:grid; grid-template-columns: 1fr 1fr; gap:10px; border-top:1px solid var(--border); padding-top:15px; }

  /* Inputs Centrati */
  .input-box { background:var(--surface2); padding:10px; border-radius:12px; display:flex; flex-direction:column; align-items:center; }
  .input-box label { font-size:10px; text-transform:uppercase; color:var(--text3); margin-bottom:4px; font-weight:600; }
  
  .input-wrapper { display: flex; align-items: center; justify-content: center; gap: 2px; }
  .input-wrapper input { 
    background:transparent; border:none; text-align:center; font-family:'DM Mono', monospace; 
    font-size:16px; color:var(--text); font-weight:600; outline:none; width: 1ch;
  }
  .input-wrapper span { font-size: 14px; color: var(--text3); font-weight: 500; }

  /* Footer Stats */
  .footer-stats { 
    position:fixed; bottom:0; left:0; right:0; background:var(--surface); 
    padding:15px 20px 30px; border-top:1px solid var(--border); 
    display:grid; grid-template-columns:1fr 1fr; gap:10px; box-shadow:0 -5px 20px rgba(0,0,0,0.05);
  }
  .stat-item { background:var(--bg); padding:12px; border-radius:14px; text-align:center; }
  .stat-label { font-size:10px; color:var(--text3); text-transform:uppercase; margin-bottom:2px; font-weight:600; }
  .stat-val { font-size:16px; font-weight:700; color:var(--text); font-family:'DM Mono', monospace; }
  .countdown { font-size:12px; color:var(--orange); font-weight:600; margin-top:2px; display:block; }

  .toast { position:fixed; bottom:150px; left:50%; transform:translateX(-50%); background:#333; color:white; padding:10px 20px; border-radius:20px; font-size:13px; opacity:0; transition:0.3s; z-index:1000; pointer-events:none; }
  .toast.show { opacity:1; }
</style>
</head>
<body id="app">

  <div id="login-screen" style="display:none;">
    <div class="login-card">
      <h2 style="margin-bottom:15px;">Spese Casa</h2>
      <p style="font-size:13px; color:var(--text3); margin-bottom:20px;">Inserisci le tue credenziali per accedere ai dati sincronizzati.</p>
      <input type="email" id="login-email" placeholder="Email">
      <input type="password" id="login-pass" placeholder="Password">
      <button onclick="window.handleLogin()" class="btn-icon" style="width:100%; border-radius:12px; background:var(--accent); color:white; margin-top:10px;">Accedi</button>
      <p id="login-err" style="color:var(--red); font-size:12px; margin-top:10px; display:none;"></p>
    </div>
  </div>

  <header>
    <div class="top-bar">
      <button class="btn-icon" onclick="window.exportJSON()">⬇️</button>
      <button class="btn-icon" id="theme-btn" onclick="window.toggleTheme()">🌙</button>
    </div>
    <div class="month-nav">
      <button class="btn-nav" onclick="window.changeMonth(-1)">‹</button>
      <h1 id="month-label">APRILE 2026</h1>
      <button class="btn-nav" onclick="window.changeMonth(1)">›</button>
    </div>
    <div style="font-size:12px; color:var(--header-sub); font-weight:500;">Budget Totale: 1.200,00 €</div>
  </header>

  <div class="container" id="cards-container"></div>

  <div class="footer-stats">
    <div class="stat-item">
      <div class="stat-label">Spesa Aggregata</div>
      <div class="stat-val" id="total-agg">0,00 €</div>
      <span class="countdown" id="count-agg">Residuo: 0 €</span>
    </div>
    <div class="stat-item" style="border:1px solid var(--border);">
      <div class="stat-label">Spese Extra</div>
      <div class="stat-val" id="total-extra">0,00 €</div>
      <span class="countdown" id="count-extra">Extra: 0 €</span>
    </div>
  </div>

  <div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDAVqnxJxczuzSlLRlVNkVDT1XpIvreNM0",
  authDomain: "spese-casa-69d8d.firebaseapp.com",
  projectId: "spese-casa-69d8d",
  storageBucket: "spese-casa-69d8d.firebasestorage.app",
  messagingSenderId: "635191642735",
  appId: "1:635191642735:web:720d097b574c3b09229b9a"
};

const fbApp = initializeApp(firebaseConfig);
const db    = getFirestore(fbApp);
const auth  = getAuth(fbApp);

const MONTHS = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const DAYS   = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
const GLOBAL_BUDGET = 1200;
const DOC_ID = 'spese-famiglia';

let currentYear = 2026;
let currentMonth = 3; // Aprile
let appData = {};
let openCards = new Set();
let isDark = false;

const fmt = v => v.toLocaleString('it-IT',{minimumFractionDigits:2}) + ' €';
const parse = s => parseFloat(String(s).replace(',','.')) || 0;

// --- GESTIONE AUTH ---
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById('login-screen').style.display = 'none';
    loadFromFirebase();
  } else {
    document.getElementById('login-screen').style.display = 'flex';
  }
});

window.handleLogin = async () => {
  const email = document.getElementById('login-email').value;
  const pass = document.getElementById('login-pass').value;
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (e) {
    const err = document.getElementById('login-err');
    err.textContent = "Accesso negato: verifica le credenziali.";
    err.style.display = 'block';
  }
};

// --- CORE LOGIC ---
async function loadFromFirebase() {
  const snap = await getDoc(doc(db, 'spese', DOC_ID));
  if (snap.exists()) appData = snap.data().appData || {};
  buildCards();
  
  onSnapshot(doc(db, 'spese', DOC_ID), s => {
    if (s.exists() && !s.metadata.hasPendingWrites) {
      appData = s.data().appData || {};
      buildCards();
    }
  });
}

async function saveToFirebase() {
  await setDoc(doc(db, 'spese', DOC_ID), {appData, updatedAt: new Date().toISOString()});
}

function buildCards() {
  const key = `${currentYear}-${currentMonth}`;
  document.getElementById('month-label').textContent = `${MONTHS[currentMonth].toUpperCase()} ${currentYear}`;
  
  if (!appData[key]) {
    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
    appData[key] = Array.from({length:daysInMonth}, (_,i) => {
      const dow = new Date(currentYear, currentMonth, i+1).getDay();
      return { day:i+1, budget: (dow===0?0:dow===1?30:dow===6?50:40), super:'', panif:'', tigo:'', farm:'', boll:'', extra:'' };
    });
  }

  const container = document.getElementById('cards-container');
  container.innerHTML = '';
  const today = new Date();

  appData[key].forEach((d, i) => {
    const dow = new Date(currentYear, currentMonth, d.day).getDay();
    const isToday = today.getDate()===d.day && today.getMonth()===currentMonth && today.getFullYear()===currentYear;
    
    const card = document.createElement('div');
    card.className = `day-card ${isToday ? 'today' : ''}`;
    
    const diff = d.super==='' ? null : parse(d.budget) - parse(d.super);
    const diffText = diff === null ? '-' : (diff>=0?'+':'')+fmt(diff);

    card.innerHTML = `
      <div class="card-header" onclick="window.toggleCard(${i})">
        <div class="day-info">
          <span class="day-num">${d.day}</span>
          <span class="day-name">${DAYS[dow]}</span>
        </div>
        <div class="card-summary ${diff>=0?'pos':'neg'}">${diffText}</div>
      </div>
      <div class="card-content ${openCards.has(i)?'open':''}" id="content-${i}">
        ${inputField(i, 'budget', 'Budget', d.budget)}
        ${inputField(i, 'super', 'Supermercato', d.super)}
        ${inputField(i, 'panif', 'Panificio', d.panif)}
        ${inputField(i, 'tigo', 'Tigotà', d.tigo)}
        ${inputField(i, 'farm', 'Farmacia', d.farm)}
        ${inputField(i, 'boll', 'Bollette', d.boll)}
        ${inputField(i, 'extra', 'Extra', d.extra)}
      </div>
    `;
    container.appendChild(card);
  });
  updateTotals();
}

function inputField(idx, col, label, val) {
  const v = (val !== '' && val !== undefined) ? val : '';
  const w = v !== '' ? Math.max(1, String(v).length + 0.2) + 'ch' : '1ch';
  return `
    <div class="input-box" onclick="this.querySelector('input').focus()">
      <label>${label}</label>
      <div class="input-wrapper">
        <input type="number" step="0.01" value="${v}" style="width:${w}"
          oninput="this.style.width=Math.max(1,this.value.length+0.2)+'ch'; window._ud(${idx},'${col}',this.value)">
        <span>€</span>
      </div>
    </div>
  `;
}

window.toggleCard = i => {
  if (openCards.has(i)) openCards.delete(i); else openCards.add(i);
  buildCards();
};

window._ud = (idx, col, val) => {
  const key = `${currentYear}-${currentMonth}`;
  appData[key][idx][col] = val;
  updateTotals();
  clearTimeout(window.saveTimer);
  window.saveTimer = setTimeout(saveToFirebase, 1500);
};

function updateTotals() {
  const data = appData[`${currentYear}-${currentMonth}`] || [];
  let tB=0, tS=0, tP=0, tT=0, tF=0, tBo=0, tE=0;
  
  data.forEach(d => {
    tB += parse(d.budget);
    tS += parse(d.super); tP += parse(d.panif); tT += parse(d.tigo);
    tF += parse(d.farm); tBo += parse(d.boll); tE += parse(d.extra);
  });

  const agg = tS + tP + tT;
  const extra = tF + tBo + tE;
  const budgetExtra = GLOBAL_BUDGET - tB;

  document.getElementById('total-agg').textContent = fmt(agg);
  document.getElementById('count-agg').textContent = `Residuo: ${fmt(tB - agg)}`;
  
  document.getElementById('total-extra').textContent = fmt(extra);
  document.getElementById('count-extra').textContent = `Extra residuo: ${fmt(budgetExtra - extra)}`;
}

window.changeMonth = s => {
  currentMonth += s;
  if (currentMonth > 11) { currentMonth=0; currentYear++; }
  else if (currentMonth < 0) { currentMonth=11; currentYear--; }
  openCards.clear();
  buildCards();
};

window.toggleTheme = () => {
  isDark=!isDark;
  document.body.classList.toggle('dark', isDark);
  document.getElementById('theme-btn').textContent = isDark ? '☀️' : '🌙';
};

window.exportJSON = () => {
  const blob = new Blob([JSON.stringify(appData, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=`Spese_Casa_${currentYear}.json`; a.click();
};

enableIndexedDbPersistence(db).catch(()=>{});
</script>
</body>
</html>
