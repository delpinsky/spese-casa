<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Spese Casa">
<meta name="theme-color" content="#d6edba">
<link rel="manifest" href="manifest.json">
<title>Spese Casa</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg:#f2f0eb; --surface:#ffffff; --surface2:#e8e6e0; --border:rgba(0,0,0,0.08);
    --text:#1c1b18; --text2:#5a5955; --text3:#9a9890;
    --header-bg:#d6edba; --header-text:#1c3a14; --header-sub:#4a7a3a;
    --accent:#3a7a28; --today-bg:#e8f0fb; --today-accent:#2a6dd4;
    --green:#2e7d32; --red:#c62828; --orange:#854f0b;
    --font:'DM Sans', sans-serif; --mono:'DM Mono', monospace;
  }
  .dark {
    --bg:#151412; --surface:#222220; --surface2:#2c2c2a; --border:rgba(255,255,255,0.08);
    --text:#f0ede8; --text2:#a0a09a; --text3:#606058;
    --header-bg:#1a2a10; --header-text:#d0e8b8; --header-sub:#7aaa5a;
    --accent:#7aaa5a; --today-bg:#0d1e3a; --today-accent:#5b8fe8;
  }

  /* --- LOGIN --- */
  #login-overlay {
    position:fixed; top:0; left:0; width:100%; height:100%; background:var(--bg); 
    z-index:10000; display:flex; align-items:center; justify-content:center; padding:25px;
  }
  .login-card {
    background:var(--surface); padding:32px; border-radius:24px; width:100%; max-width:340px; 
    box-shadow:0 12px 40px rgba(0,0,0,0.12); text-align:center; border:1px solid var(--border);
  }
  .login-card input {
    width:100%; padding:14px; margin:8px 0; border-radius:12px; border:1px solid var(--border);
    background:var(--bg); color:var(--text); font-size:16px; outline:none;
  }
  .login-btn {
    width:100%; padding:14px; margin-top:15px; border-radius:12px; border:none;
    background:var(--accent); color:white; font-weight:600; cursor:pointer;
  }

  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:var(--font);padding-bottom:180px;transition:background .25s}

  /* --- HEADER --- */
  .header{background:var(--header-bg);padding:52px 20px 16px;position:sticky;top:0;z-index:50;border-bottom:1px solid var(--border)}
  .header-top{display:flex;justify-content:space-between;align-items:flex-start}
  .header-title{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--header-sub)}
  .header-month{font-size:26px;font-weight:600;color:var(--header-text);line-height:1;margin:2px 0}
  .header-budget{font-size:13px;color:var(--header-sub)}
  .header-right{display:flex;gap:8px;align-items:center;padding-top:4px}
  .icon-btn{background:rgba(0,0,0,0.06);border:none;border-radius:10px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer}

  /* --- SYNC BAR --- */
  .sync-bar{display:flex;align-items:center;justify-content:center;gap:6px;padding:6px 16px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.05em}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
  .sync-bar.synced{color:var(--green)}
  .sync-bar.syncing{color:var(--orange)}

  /* --- CARDS --- */
  .cards-list{padding:12px;display:flex;flex-direction:column;gap:10px}
  .day-card{background:var(--surface);border:.5px solid var(--border);border-radius:16px;overflow:hidden}
  .day-card.today{border:1.5px solid var(--today-accent);background:var(--today-bg)}
  .card-header{display:flex;align-items:center;padding:12px 14px;gap:12px;cursor:pointer}
  .day-badge{width:42px;height:42px;border-radius:12px;background:var(--surface2);display:flex;flex-direction:column;align-items:center;justify-content:center}
  .today .day-badge{background:var(--today-accent);color:#fff}
  .day-num{font-size:18px;font-weight:700;line-height:1}
  .day-name{font-size:9px;font-weight:600;text-transform:uppercase;opacity:0.7}
  .card-summary-val{font-family:var(--mono);font-size:14px;font-weight:600;margin-left:auto}

  .card-body{display:none;padding:0 14px 14px;flex-direction:column;gap:8px;border-top:.5px solid var(--border);padding-top:12px}
  .open .card-body{display:flex}
  .field-row{display:flex;align-items:center;gap:10px}
  .field-label{font-size:12px;color:var(--text3);width:100px;flex-shrink:0}
  .field-input{flex:1;background:var(--bg);border:.5px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:14px;padding:8px;text-align:right;outline:none}

  /* --- FOOTER (Stile Originale Richiesto) --- */
  .footer-container { 
    position:fixed; bottom:0; left:0; right:0; background:var(--surface); 
    border-top:1px solid var(--border); z-index:100;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .footer-stats { 
    display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:15px 15px 10px;
  }
  .stat-item { background:var(--bg); padding:12px; border-radius:14px; text-align:center; }
  .stat-label { font-size:10px; color:var(--text3); text-transform:uppercase; margin-bottom:2px; font-weight:600; }
  .stat-val { font-size:16px; font-weight:700; color:var(--text); font-family:var(--mono); }
  .countdown { font-size:12px; color:var(--orange); font-weight:600; margin-top:2px; display:block; }

  .bottom-nav{display:flex; padding:0 15px 15px; gap:8px;}
  .bottom-btn{flex:1;background:var(--surface2);border:none;border-radius:12px;color:var(--text2);padding:12px 5px;display:flex;flex-direction:column;align-items:center;gap:3px}
  .bottom-btn.primary{background:var(--accent);color:white}
  .bb-label{font-size:10px;font-weight:700;text-transform:uppercase}

  .toast { position:fixed; bottom:200px; left:50%; transform:translateX(-50%); background:#333; color:white; padding:10px 20px; border-radius:20px; font-size:13px; opacity:0; transition:0.3s; z-index:1000; pointer-events:none; }
  .toast.show { opacity:1; }
</style>
</head>
<body id="app">

<div id="login-overlay" style="display:none;">
  <div class="login-card">
    <div style="font-size: 40px; margin-bottom: 10px;">🏠</div>
    <h2 style="margin-bottom:20px;">Spese Casa</h2>
    <input type="email" id="login-email" placeholder="Email">
    <input type="password" id="login-pass" placeholder="Password">
    <button class="login-btn" onclick="window.handleLogin()">Accedi</button>
    <p id="login-err" style="color:var(--red); font-size:12px; margin-top:15px; display:none;"></p>
  </div>
</div>

<div class="header">
  <div class="header-top">
    <div>
      <div class="header-title">Riepilogo Mensile</div>
      <div class="header-month" id="hdr-month">—</div>
      <div class="header-budget">Budget: 1.200 €</div>
    </div>
    <div class="header-right">
      <button class="icon-btn" onclick="toggleTheme()" id="theme-btn">🌙</button>
      <button class="icon-btn" onclick="changeMonth(-1)">◀</button>
      <button class="icon-btn" onclick="changeMonth(1)">▶</button>
    </div>
  </div>
</div>

<div class="sync-bar offline" id="sync-bar">
  <div class="sync-dot"></div>
  <span id="sync-label">Offline</span>
</div>

<div class="cards-list" id="cards-list"></div>

<div class="footer-container">
  <div class="footer-stats">
    <div class="stat-item">
      <div class="stat-label">Spesa Aggregata</div>
      <div class="stat-val" id="total-agg">0,00 €</div>
      <span class="countdown" id="count-agg">Residuo: 0 €</span>
    </div>
    <div class="stat-item">
      <div class="stat-label">Spese Extra</div>
      <div class="stat-val" id="total-extra">0,00 €</div>
      <span class="countdown" id="count-extra">Extra: 0 €</span>
    </div>
  </div>
  <div class="bottom-nav">
    <button class="bottom-btn primary" onclick="forceSave()"><span class="bb-label">☁️ Salva</span></button>
    <button class="bottom-btn" onclick="exportJSON()"><span class="bb-label">⬇️ Export</span></button>
    <button class="bottom-btn" onclick="document.getElementById('file-upload').click()"><span class="bb-label">⬆️ Carica</span></button>
  </div>
</div>

<input type="file" id="file-upload" style="display:none" onchange="importJSON(event)">
<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDAVqnxJxczuzSlLRlVNkVDT1XpIvreNM0",
  authDomain: "spese-casa-69d8d.firebaseapp.com",
  projectId: "spese-casa-69d8d",
  storageBucket: "spese-casa-69d8d.firebasestorage.app",
  messagingSenderId: "635191642735",
  appId: "1:635191642735:web:720d097b574c3b09229b9a"
};

const fbApp = initializeApp(firebaseConfig);
const db    = getFirestore(fbApp);
const auth  = getAuth(fbApp);

const MONTHS = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
const DAYS   = ['Dom','Lun','Mar','Mer','Gio','Ven','Sab'];
const GLOBAL_BUDGET = 1200;
const DOC_ID = 'spese-famiglia';

let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let appData = {};
let openCards = new Set();
let isDark = false;

const fmt = v => v.toLocaleString('it-IT',{minimumFractionDigits:2}) + ' €';
const parse = s => parseFloat(String(s).replace(',','.')) || 0;

// --- AUTH ---
onAuthStateChanged(auth, (user) => {
  if (user) {
    document.getElementById('login-overlay').style.display = 'none';
    loadFromFirebase();
  } else {
    document.getElementById('login-overlay').style.display = 'flex';
  }
});

window.handleLogin = async () => {
  const email = document.getElementById('login-email').value;
  const pass = document.getElementById('login-pass').value;
  try {
    await signInWithEmailAndPassword(auth, email, pass);
  } catch (e) {
    document.getElementById('login-err').textContent = "Credenziali errate.";
    document.getElementById('login-err').style.display = 'block';
  }
};

// --- DATA ---
async function loadFromFirebase() {
  updateSync('syncing', 'Caricamento...');
  const snap = await getDoc(doc(db, 'spese', DOC_ID));
  if (snap.exists()) appData = snap.data().appData || {};
  buildCards();
  
  onSnapshot(doc(db, 'spese', DOC_ID), s => {
    if (s.exists() && !s.metadata.hasPendingWrites) {
      appData = s.data().appData || {};
      buildCards();
      updateSync('synced', 'Sincronizzato');
    }
  });
}

function buildCards() {
  const key = `${currentYear}-${currentMonth}`;
  document.getElementById('hdr-month').textContent = `${MONTHS[currentMonth]} ${currentYear}`;
  
  if (!appData[key]) {
    const days = new Date(currentYear, currentMonth + 1, 0).getDate();
    appData[key] = Array.from({length:days}, (_,i) => {
      const dow = new Date(currentYear, currentMonth, i+1).getDay();
      return { day:i+1, budget:(dow===0?0:dow===1?30:dow===6?50:40), super:'', panif:'', tigo:'', farm:'', boll:'', extra:'' };
    });
  }

  const container = document.getElementById('cards-list');
  container.innerHTML = '';
  
  appData[key].forEach((d, i) => {
    const dow = new Date(currentYear, currentMonth, d.day).getDay();
    const isToday = new Date().getDate()===d.day && new Date().getMonth()===currentMonth;
    const card = document.createElement('div');
    card.className = `day-card ${isToday ? 'today' : ''} ${openCards.has(i)?'open':''}`;
    
    const dayTotal = parse(d.super) + parse(d.panif) + parse(d.tigo);

    card.innerHTML = `
      <div class="card-header" onclick="window.toggleCard(${i})">
        <div class="day-badge">
          <span class="day-num">${d.day}</span>
          <span class="day-name">${DAYS[dow]}</span>
        </div>
        <div style="flex:1">
          <div style="font-size:11px; color:var(--text3); font-weight:600">Budget: ${fmt(parse(d.budget))}</div>
          <div style="font-size:14px; font-weight:700">${dayTotal > 0 ? fmt(dayTotal) : '—'}</div>
        </div>
        <div class="card-summary-val" style="color:${parse(d.budget)-dayTotal >=0 ? 'var(--green)':'var(--red)'}">
          ${dayTotal > 0 ? (parse(d.budget)-dayTotal >=0 ? '+':'-') + Math.abs(parse(d.budget)-dayTotal).toFixed(0) : ''}
        </div>
      </div>
      <div class="card-body">
        ${inputRow(i, 'budget', 'Budget', d.budget)}
        ${inputRow(i, 'super', 'Supermercato', d.super)}
        ${inputRow(i, 'panif', 'Panificio', d.panif)}
        ${inputRow(i, 'tigo', 'Tigotà', d.tigo)}
        <div style="height:1px; background:var(--border); margin:4px 0"></div>
        ${inputRow(i, 'farm', 'Farmacia', d.farm)}
        ${inputRow(i, 'boll', 'Bollette', d.boll)}
        ${inputRow(i, 'extra', 'Extra', d.extra)}
      </div>
    `;
    container.appendChild(card);
  });
  updateTotals();
}

function inputRow(idx, col, label, val) {
  return `
    <div class="field-row">
      <div class="field-label">${label}</div>
      <input type="number" step="0.01" class="field-input" value="${val}" 
        oninput="window._ud(${idx},'${col}',this.value)">
      <div style="font-size:12px; color:var(--text3); width:15px">€</div>
    </div>
  `;
}

window._ud = (idx, col, val) => {
  appData[`${currentYear}-${currentMonth}`][idx][col] = val;
  updateTotals();
  clearTimeout(window.saveT);
  updateSync('syncing', 'In attesa...');
  window.saveT = setTimeout(forceSave, 1500);
};

function updateTotals() {
  const data = appData[`${currentYear}-${currentMonth}`] || [];
  let tB=0, tS=0, tP=0, tT=0, tF=0, tBo=0, tE=0;
  data.forEach(d => {
    tB += parse(d.budget); tS += parse(d.super); tP += parse(d.panif); 
    tT += parse(d.tigo); tF += parse(d.farm); tBo += parse(d.boll); tE += parse(d.extra);
  });

  const agg = tS + tP + tT;
  const extraTotal = tF + tBo + tE;
  const residuoAgg = tB - agg;
  const residuoExtra = (GLOBAL_BUDGET - tB) - extraTotal;

  document.getElementById('total-agg').textContent = fmt(agg);
  document.getElementById('count-agg').textContent = `Residuo: ${residuoAgg.toFixed(0)} €`;
  document.getElementById('total-extra').textContent = fmt(extraTotal);
  document.getElementById('count-extra').textContent = `Extra: ${residuoExtra.toFixed(0)} €`;
  
  document.getElementById('count-agg').style.color = residuoAgg >= 0 ? 'var(--green)' : 'var(--red)';
  document.getElementById('count-extra').style.color = residuoExtra >= 0 ? 'var(--orange)' : 'var(--red)';
}

function updateSync(state, label) {
  const bar = document.getElementById('sync-bar');
  bar.className = `sync-bar ${state}`;
  document.getElementById('sync-label').textContent = label;
}

window.forceSave = () => {
  updateSync('syncing', 'Salvataggio...');
  setDoc(doc(db, 'spese', DOC_ID), {appData, updatedAt: new Date().toISOString()})
    .then(() => updateSync('synced', 'Sincronizzato'));
};

window.toggleCard = i => { if(openCards.has(i)) openCards.delete(i); else openCards.add(i); buildCards(); };
window.changeMonth = s => { currentMonth+=s; if(currentMonth>11){currentMonth=0;currentYear++;} else if(currentMonth<0){currentMonth=11;currentYear--;} openCards.clear(); buildCards(); };
window.toggleTheme = () => { isDark=!isDark; document.body.classList.toggle('dark', isDark); document.getElementById('theme-btn').textContent = isDark?'☀️':'🌙'; };
window.exportJSON = () => { const a = document.createElement('a'); a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(appData)); a.download = `Spese_${currentYear}.json`; a.click(); };
</script>
</body>
</html>
